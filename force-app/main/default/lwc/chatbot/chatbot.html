<template>
    <div class="slds-scope">

        <!-- Floating Bubble -->
        <div class={chatIconClass} onclick={toggleChat} title="Open Assistant">
            <lightning-icon icon-name="utility:chat" variant="inverse" size="medium">
            </lightning-icon>
        </div>

        <template if:true={isOpen}>
            <section class="premium-chat-container">

                <!-- Header -->
                <header class="chat-header">
                    <div class="header-content">
                        <span class="status-dot"></span>
                        <div class="header-text">
                            <h2>Task Assistant</h2>
                            <p class="sub-text">Lead Support v1.0</p>
                        </div>
                    </div>
                    <lightning-button-icon
                        icon-name="utility:minimize_window"
                        onclick={toggleChat}
                        variant="bare-inverse">
                    </lightning-button-icon>
                </header>

                <!-- Language Selector -->
                <div class="lang-bar">
                    <button class={engChipClass} onclick={setEnglish}>EN</button>
                    <button class={hinChipClass} onclick={setHindi}>हिन्दी</button>
                    <button class={benChipClass} onclick={setBengali}>বাংলা</button>
                </div>

                <!-- Chat Messages -->
                <div class="chat-messages" lwc:ref="msgContainer">
                    <template for:each={messages} for:item="msg">
                        <div key={msg.id} class={msg.wrapClass}>
                            <div class={msg.bubbleClass}>
                                <template if:true={msg.isBot}>
                                    <div class="bot-avatar">
                                        <lightning-icon icon-name="utility:einstein" size="xx-small" variant="inverse"></lightning-icon>
                                    </div>
                                </template>
                                <div class="bubble-content">
                                    <p class="bubble-text">{msg.text}</p>
                                    <!-- Quick Reply Buttons -->
                                    <template if:true={msg.hasOptions}>
                                        <div class="quick-replies">
                                            <template for:each={msg.options} for:item="opt">
                                                <button key={opt.value} class="quick-btn" data-value={opt.value} onclick={handleQuickReply}>
                                                    {opt.label}
                                                </button>
                                            </template>
                                        </div>
                                    </template>
                                    <!-- Task Link -->
                                    <template if:true={msg.taskLink}>
                                        <a href={msg.taskLink} target="_blank" class="task-link">
                                            🔗 Open Task
                                        </a>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                    <!-- Typing Indicator -->
                    <template if:true={isTyping}>
                        <div class="msg-wrap bot-wrap">
                            <div class="bubble bot-bubble">
                                <div class="bot-avatar">
                                    <lightning-icon icon-name="utility:einstein" size="xx-small" variant="inverse"></lightning-icon>
                                </div>
                                <div class="bubble-content">
                                    <div class="typing-dots">
                                        <span></span><span></span><span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Footer Input -->
                <footer class="chat-footer">
                    <div class={inputWrapperClass}>
                        <input
                            type="text"
                            placeholder={placeholderText}
                            disabled={isInputDisabled}
                            value={userInput}
                            oninput={handleInputChange}
                            onkeydown={handleKeyDown}
                            class="custom-input" />
                        <button 
                            class={micClass} 
                            onclick={handleListen} 
                            disabled={isInputDisabled}
                            title="Voice Input">
                            <span class="mic-icon-wrapper">
                                <lightning-icon 
                                    icon-name="utility:unmuted" 
                                    size="small" 
                                    variant="inverse">
                                </lightning-icon>
                            </span>
                        </button>
                    </div>
                    <button class="send-btn" onclick={handleSend} disabled={isInputDisabled}>
                        <template if:true={isProcessing}>
                            <span class="spinner"></span>
                        </template>
                        <template if:false={isProcessing}>
                            <lightning-icon icon-name="utility:send" size="xx-small" variant="inverse"></lightning-icon>
                        </template>
                    </button>
                </footer>

            </section>
        </template>
    </div>
</template>
