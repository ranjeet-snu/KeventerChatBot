<template>
    <div class="slds-scope">
        <div class={chatIconClass} onclick={toggleChat}>
            <lightning-icon icon-name="utility:chat" alternative-text="Chat" variant="inverse" size="medium"></lightning-icon>
        </div>

        <template if:true={isOpen}>
            <section class="premium-chat-container slds-popover slds-nubbin_bottom-right">
                <header class="chat-header">
                    <div class="header-content">
                        <span class="status-dot"></span>
                        <h2>Assistant</h2>
                    </div>
                    <lightning-button-icon icon-name="utility:minimize_window" onclick={toggleChat} variant="bare-inverse"></lightning-button-icon>
                </header>

                <div class="chat-body">
                    <p class="bot-msg">Please put your comments below...</p>
                    <template if:true={isProcessing}>
                        <div class="loader">Updating record...</div>
                    </template>
                </div>

                <footer class="chat-footer">
                    <div class="input-wrapper">
                        <input type="text" placeholder="Type or use mic..." value={userInput} onchange={handleInputChange} class="custom-input"/>
                        <button class={micClass} onclick={handleListen}>
                            <lightning-icon icon-name="utility:record" size="xx-small" variant={micVariant}></lightning-icon>
                        </button>
                    </div>
                    <button class="send-btn" onclick={handleUpdate}>Update Lead Task</button>
                </footer>
            </section>
        </template>
    </div>
</template>
